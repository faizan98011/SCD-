<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping Website Layout</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 10%; 
            background-color: #ff0000;
            flex-shrink: 0;
        }

        .main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            height: 140px; 
            background-color: #fff;
            align-items: stretch;
            overflow: hidden; 
        }

        .logo-area {
            width: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .logo-area img {
            max-width: 140px;
            height: auto;
        }

        /* Yahan poori setting ki hai neeli line hatane ke liye */
        .banner-area {
            width: 80%;
            background-image: url('https://thumbs.dreamstime.com/z/online-shopping-e-commerce-concept-banner-background-flat-design-57741893.jpg');
            background-size: 100% 125%; /* Height mazeed badha di taake neela hissa mazeed niche chala jaye */
            background-repeat: no-repeat;
            background-position: center top; /* Image ko top se fix kiya */
        }

        .nav-bar {
            background-color: #000;
            padding: 12px 0;
            position: relative;
            z-index: 5;
        }

        .nav-bar a {
            color: white;
            text-decoration: none;
            padding: 0 25px;
            font-size: 16px;
            font-weight: bold;
        }

        .content {
            display: flex;
            flex-grow: 1;
            min-height: 400px;
        }

        .left-box {
            width: 32%;
            background-color: #00802b; 
            color: white;
            padding: 10px;
        }

        .right-box {
            width: 68%;
            background-color: #ffa64d; 
            color: white;
            padding: 10px;
        }

        .footer {
            background-color: #1a1aff; 
            color: white;
            padding: 15px;
            height: 80px;
            box-sizing: border-box;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar"></div>

    <div class="main">
        
        <div class="header">
            <div class="logo-area">
                <img src="https://logodix.com/logo/2121756.png" alt="Logo">
            </div>
            <div class="banner-area"></div>
        </div>

        <div class="nav-bar">
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Products</a>
            <a href="#">Contact Us</a>
        </div>

        <div class="content">
            <div class="left-box">left</div>
            <div class="right-box">right</div>
        </div>

        <div class="footer">
            Footer Section
        </div>
        
    </div>

    <div class="sidebar"></div>
</div>

</body>
</html>
